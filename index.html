<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Cerebr</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Cerebr">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cerebr">
    <link rel="apple-touch-icon" href="icons/icon128.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
    <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png">
    <link rel="icon" type="image/png" sizes="128x128" href="icons/icon128.png">
    <script src="htmd/marked.min.js"></script>
    <script src="htmd/highlight.min.js"></script>
    <script src="htmd/mermaid.min.js"></script>
    <script src="htmd/mermaid-init.js"></script>
    <script src="htmd/mathjax-config.js"></script>
    <script type="text/javascript" id="MathJax-script" async src="htmd/tex-chtml-full.js"></script>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="chat-container"></div>

    <!-- 常用聊天選項區域 - 由 JavaScript 動態渲染 -->
    <div id="quick-chat-options">
        <!-- 選項由 src/components/quick-chat.js 中的 DEFAULT_QUICK_CHAT_OPTIONS 動態生成 -->
    </div>

    <div id="context-menu">
        <div class="context-menu-item" id="edit-message">
            <svg viewBox="0 0 24 24">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            修改
        </div>
        <div class="context-menu-item" id="copy-message">
            <svg viewBox="0 0 24 24">
                <rect x="8" y="8" width="12" height="12" rx="1"/>
                <path d="M4 16V4a1 1 0 0 1 1-1h11"/>
            </svg>
            复制消息
        </div>
        <div class="context-menu-item" id="copy-code">
            <svg viewBox="0 0 24 24">
                <path d="M16 18L22 12L16 6"/>
                <path d="M8 6L2 12L8 18"/>
            </svg>
            复制代码
        </div>
        <div class="context-menu-item" id="copy-image">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
            复制图片
        </div>
        <div class="context-menu-item" id="copy-math">
            <svg viewBox="0 0 24 24">
                <path fill="currentColor" d="M6 19.5c.2 0 .32-.08.45-.25l5.75-8.5 5.65-8.2c.08-.1.1-.2.1-.28 0-.23-.2-.38-.43-.38-.2 0-.33.06-.48.28l-5.65 8.2-5.75 8.5c-.08.1-.1.2-.1.29 0 .24.2.34.46.34zM5.2 8.1v2.1c0 .27.17.42.41.42.23 0 .41-.15.41-.42V8.1h2c.27 0 .41-.17.41-.41 0-.23-.14-.41-.41-.41h-2V4.6c0-.27-.18-.42-.41-.42-.24 0-.41.15-.41.42v2.68h-2c-.27 0-.41.18-.41.41 0 .24.14.41.41.41h2zm9.2 8.6c0 .23.15.4.35.4h5.1c.27 0 .41-.17.41-.4 0-.23-.14-.4-.41-.4h-5.1c-.2 0-.35.17-.35.4z"/>
            </svg>
            复制公式
        </div>
        <div class="context-menu-item" id="regenerate-message">
            <svg viewBox="0 0 24 24">
                <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"></path>
            </svg>
            重新生成
        </div>
        <div class="context-menu-item" id="delete-message">
            <svg viewBox="0 0 24 24">
                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7"/>
                <path d="M3 7h18"/>
                <path d="M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/>
            </svg>
            删除消息
        </div>
    </div>
    <div id="input-container">
        <div id="input-image-preview" class="input-image-preview"></div>
        <div class="input-actions">
            <button id="settings-button">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="6" r="2"/>
                    <circle cx="12" cy="12" r="2"/>
                    <circle cx="12" cy="18" r="2"/>
                </svg>
            </button>
            <div class="button-switch-container">
                <button id="new-chat-button" title="新对话">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="stop-response-button" title="停止生成">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="4" y="4" width="8" height="8" rx="1" fill="currentColor"/>
                    </svg>
                </button>
            </div>
            <!-- 模型選擇子菜單 -->
            <div id="model-selector-menu">
                <div class="model-selector-search">
                    <input type="text" class="model-search-input" placeholder="搜索模型...">
                </div>
                <div class="model-selector-list">
                    <!-- 模型列表將由 JavaScript 動態生成 -->
                </div>
                <div class="model-selector-empty" style="display: none;">
                    请先配置 API
                </div>
            </div>
        </div>
        <div id="settings-menu">
            <div class="menu-item" id="send-webpage-toggle">
                <span>传送网页</span>
                <label class="switch">
                    <input type="checkbox" id="send-webpage-switch">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="menu-item" id="web-search-toggle">
                <span>网络搜索</span>
                <div class="web-search-controls">
                    <button class="provider-toggle-button" id="search-provider-switch" data-value="tavily" title="点击切换搜索提供者：Tavily ↔ Exa">
                        <span class="provider-label provider-tavily">T</span>
                        <span class="provider-label provider-exa">E</span>
                    </button>
                    <button class="tri-state-button" id="web-search-switch" data-value="off" title="点击切换：关闭 → 自动 → 开启">
                        <svg class="icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                        <svg class="icon-auto" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                        </svg>
                        <svg class="icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="menu-item" id="side-panel-toggle">
                <span>侧栏模式</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="15" y1="3" x2="15" y2="21"></line>
                </svg>
            </div>
            <div class="menu-item" id="webpage-qa">
                <span>网页内容</span>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="menu-item" id="chat-list">
                <span>历史</span>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="menu-item" id="unified-settings-toggle">
                <span>设置</span>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
        <div id="message-input-shell" class="message-input-shell">
            <div id="message-input" contenteditable="true" placeholder="输入消息..." enterkeyhint="send" role="textbox" aria-label="消息输入框" aria-multiline="true" spellcheck="true"></div>
            <div class="fake-caret" aria-hidden="true"></div>
            <div class="persistent-placeholder" aria-hidden="true"></div>
        </div>
    </div>
    <div id="chat-list-page">
        <div class="settings-header">
            <button class="back-button">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <span class="settings-title">历史</span>
            <button class="clear-all-btn" title="清除所有對話">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1m2 0v9a1 1 0 01-1 1H4a1 1 0 01-1-1V4h10z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="search-container">
                <input type="search" id="chat-search-input" placeholder="搜索对话...">
                <button class="clear-search-btn" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="chat-cards">
            <!-- 对话卡片模板 -->
            <div class="chat-card template" style="display: none;">
                <div class="card-content">
                    <div class="chat-title">新对话</div>
                    <div class="card-actions">
                        <button class="card-button webpage-url-btn" style="display: none;" title="">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.72"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.72-1.72"></path>
                            </svg>
                        </button>
                        <button class="card-button delete-btn">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M3 4H13" stroke="currentColor" stroke-width="1.5"/>
                                <path d="M5 4V12H11V4" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Clear All Chats Confirmation Modal -->
    <div id="clear-all-chats-confirm-modal" class="confirm-modal" style="display: none;">
        <div class="confirm-modal-content">
            <p>您确定要清除所有对话历史记录吗？</p>
            <small>此操作无法撤销。</small>
            <div class="confirm-modal-actions">
                <button id="cancel-clear-all-chats" class="modal-button cancel">取消</button>
                <button id="confirm-clear-all-chats" class="modal-button confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- Unified Settings Page -->
    <div id="unified-settings-page" style="display: none;">
        <div class="settings-header">
            <button class="back-button">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <span class="settings-title">设置</span>
        </div>
        <div class="settings-tabs">
            <button class="tab-button active" data-tab="quick-chat-tab">快速选项</button>
            <button class="tab-button" data-tab="api-settings-tab">API 设置</button>
            <button class="tab-button" data-tab="webdav-sync-tab">WebDAV</button>
        </div>
        <div class="settings-content">
            <div id="quick-chat-tab" class="tab-content active">
                <div class="quick-chat-settings-content">
                    <div class="quick-chat-options-list">
                        <!-- Quick chat options will be dynamically generated here -->
                    </div>
                    <div class="quick-chat-settings-actions">
                        <button id="add-quick-chat-option" class="add-button">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            添加选项
                        </button>
                        <button id="reset-quick-chat-options" class="reset-button">重置所有为默认</button>
                    </div>
                </div>
            </div>
            <div id="api-settings-tab" class="tab-content">
                <div class="api-cards">
                    <div class="api-card tavily-api-card">
                        <div class="card-content">
                            <div class="api-form">
                                <!-- 搜索提供者切换 -->
                                <div class="form-group">
                                    <label>网络搜索</label>
                                    <div class="search-provider-toggle">
                                        <button type="button" class="provider-btn active" data-provider="tavily">Tavily</button>
                                        <button type="button" class="provider-btn" data-provider="exa">Exa</button>
                                    </div>
                                </div>

                                <!-- Tavily 设置区域 -->
                                <div class="provider-settings tavily-settings active" data-provider="tavily">
                                    <div class="form-group">
                                        <label>Tavily API Key</label>
                                        <div class="tavily-key-container">
                                            <input type="text" id="tavily-api-key" class="tavily-api-key" placeholder="输入 Tavily API Key">
                                            <button id="test-tavily-btn" class="test-tavily-btn" title="测试连接">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Tavily API URL <span class="optional-label">(可选，无需添加 /search)</span></label>
                                        <input type="text" id="tavily-api-url" class="tavily-api-url" placeholder="https://api.tavily.com">
                                    </div>
                                </div>

                                <!-- Exa 设置区域 -->
                                <div class="provider-settings exa-settings" data-provider="exa">
                                    <div class="form-group">
                                        <label>Exa API Key</label>
                                        <div class="exa-key-container">
                                            <input type="text" id="exa-api-key" class="exa-api-key" placeholder="输入 Exa API Key">
                                            <button id="test-exa-btn" class="test-exa-btn" title="测试连接">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Exa API URL <span class="optional-label">(可选，无需添加 /search)</span></label>
                                        <input type="text" id="exa-api-url" class="exa-api-url" placeholder="https://api.exa.ai">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- API card - single card with profile selector -->
                    <div class="api-card main-api-card">
                        <div class="card-content">
                            <div class="api-form">
                                <!-- Profile selector -->
                                <div class="form-group profile-selector-group">
                                    <div class="form-group-header">
                                        <label>API配置</label>
                                        <div class="profile-actions">
                                            <button class="card-button rename-profile-btn" title="重命名配置">
                                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                                    <path d="M11.5 2.5L13.5 4.5L5 13H3V11L11.5 2.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                                </svg>
                                            </button>
                                            <button class="card-button add-profile-btn" title="新增配置">
                                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                                    <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                                </svg>
                                            </button>
                                            <button class="card-button delete-profile-btn" title="删除当前配置">
                                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                                    <path d="M3 4H13" stroke="currentColor" stroke-width="1.5"/>
                                                    <path d="M5 4V12H11V4" stroke="currentColor" stroke-width="1.5"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="profile-selector-container">
                                        <select class="profile-selector">
                                            <!-- Options will be dynamically generated -->
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>API Key</label>
                                    <input type="text" class="api-key" placeholder="输入 API Key">
                                </div>
                                <div class="form-group">
                                    <label>Base URL</label>
                                    <input type="text" class="base-url" placeholder="https://api.CloseAi.com/v1/chat/completions">
                                </div>
                                <div class="form-group">
                                    <label>对话模型</label>
                                    <div class="model-name-container">
                                        <input type="text" class="model-name" placeholder="输入模型名称" list="model-list-datalist">
                                        <button class="test-connection-btn" title="测试连接">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                            </svg>
                                        </button>
                                        <div class="model-list-dropdown"></div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>标题生成模型</label>
                                    <div class="model-name-container">
                                        <input type="text" class="title-model-name" placeholder="输入模型名称（可选）" list="title-model-list-datalist">
                                        <button class="test-connection-btn" title="测试连接">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                            </svg>
                                        </button>
                                        <div class="model-list-dropdown"></div>
                                    </div>
                                </div>
                                <div class="setting-item system-prompt-item">
                                    <div class="setting-header">
                                        <label for="system-prompt">系统提示</label>
                                        <div class="system-prompt-actions">
                                            <button class="expand-prompt-btn" title="展开编辑">
                                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                                    <path d="M2 6V2H6M14 6V2H10M2 10V14H6M14 10V14H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                                </svg>
                                            </button>
                                            <button class="reset-prompt-btn" title="还原默认提示词">
                                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                                    <path d="M2 8C2 4.68629 4.68629 2 8 2C9.29583 2 10.4934 2.41098 11.4704 3.11604L13 1.5M13 5.5H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                                    <path d="M14 8C14 11.3137 11.3137 14 8 14C6.70417 14 5.50659 13.589 4.52962 12.884L3 14.5M3 10.5H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                    <textarea id="system-prompt" class="system-prompt" rows="4" placeholder="输入系统提示词..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="webdav-sync-tab" class="tab-content">
                <div class="webdav-sync-content">
                    <div class="webdav-card">
                        <div class="card-content">
                            <div class="webdav-form">
                                <!-- 啟用開關 -->
                                <div class="form-group webdav-enable-group">
                                    <label>启用 WebDAV</label>
                                    <label class="switch">
                                        <input type="checkbox" id="webdav-enabled-switch">
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <!-- 伺服器設置 -->
                                <div class="form-group">
                                    <label>服务器地址</label>
                                    <div class="webdav-server-container">
                                        <input type="text" id="webdav-server-url" class="webdav-input" placeholder="https://dav.example.com">
                                        <button type="button" id="webdav-test-connection" class="test-connection-btn" title="测试连接">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                            </svg>
                                        </button>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>用户名</label>
                                    <input type="text" id="webdav-username" class="webdav-input" placeholder="输入用户名">
                                </div>

                                <div class="form-group">
                                    <label>密码</label>
                                    <div class="webdav-password-container">
                                        <input type="password" id="webdav-password" class="webdav-input" placeholder="输入密码">
                                        <button type="button" id="webdav-toggle-password" class="toggle-password-btn" title="显示/隐藏密码">
                                            <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                                <circle cx="12" cy="12" r="3"></circle>
                                            </svg>
                                            <svg class="eye-off-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                                <line x1="1" y1="1" x2="23" y2="23"></line>
                                            </svg>
                                        </button>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>同步路径 <span class="optional-label">(可选)</span></label>
                                    <input type="text" id="webdav-sync-path" class="webdav-input" placeholder="/cerebr-sync/">
                                </div>

                                <!-- 同步 API 配置選項 -->
                                <div class="webdav-sync-api-section">
                                    <div class="form-group webdav-sync-api-group">
                                        <label>同步API配置</label>
                                        <label class="switch">
                                            <input type="checkbox" id="webdav-sync-api-switch">
                                            <span class="slider"></span>
                                        </label>
                                    </div>
                                </div>

                                <!-- 同步操作按鈕 -->
                                <div class="webdav-sync-actions">
                                    <button type="button" id="webdav-sync-upload" class="webdav-action-btn webdav-upload-btn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                            <polyline points="17 8 12 3 7 8"></polyline>
                                            <line x1="12" y1="3" x2="12" y2="15"></line>
                                        </svg>
                                        上传到云端
                                    </button>
                                    <button type="button" id="webdav-sync-download" class="webdav-action-btn webdav-download-btn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                            <polyline points="7 10 12 15 17 10"></polyline>
                                            <line x1="12" y1="15" x2="12" y2="3"></line>
                                        </svg>
                                        从云端下载
                                    </button>
                                </div>

                                <!-- 最後同步時間 -->
                                <div class="webdav-last-sync">
                                    <span class="webdav-last-sync-label">上次同步：</span>
                                    <span id="webdav-last-sync-time" class="webdav-last-sync-time">从未同步</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- WebDAV Conflict Resolution Modal -->
    <div id="webdav-conflict-modal" class="confirm-modal" style="display: none;">
        <div class="confirm-modal-content webdav-conflict-content">
            <div class="conflict-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>同步冲突</span>
            </div>
            <p class="conflict-message">本地和云端数据都有更改，请选择要保留的版本：</p>
            <div class="conflict-info">
                <div class="conflict-option" id="conflict-local-info">
                    <div class="conflict-option-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                        <span>本地数据</span>
                    </div>
                    <div class="conflict-option-time" id="conflict-local-time">--</div>
                </div>
                <div class="conflict-option" id="conflict-remote-info">
                    <div class="conflict-option-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
                        </svg>
                        <span>云端数据</span>
                    </div>
                    <div class="conflict-option-time" id="conflict-remote-time">--</div>
                </div>
            </div>
            <div class="confirm-modal-actions conflict-actions">
                <button id="conflict-use-local" class="modal-button conflict-btn-local">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    使用本地
                </button>
                <button id="conflict-use-remote" class="modal-button conflict-btn-remote">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    使用云端
                </button>
            </div>
        </div>
    </div>

    <!-- System Prompt Expand Modal -->
    <div id="system-prompt-modal" class="system-prompt-modal" style="display: none;">
        <div class="system-prompt-modal-content">
            <div class="system-prompt-modal-header">
                <span class="system-prompt-modal-title">编辑系统提示</span>
                <button class="system-prompt-modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <textarea class="system-prompt-modal-textarea" placeholder="输入系统提示词..."></textarea>
            <div class="system-prompt-modal-actions">
                <button class="system-prompt-modal-cancel">取消</button>
                <button class="system-prompt-modal-save">保存</button>
            </div>
        </div>
    </div>

    <!-- Quick Chat Prompt Expand Modal -->
    <div id="quick-chat-prompt-modal" class="quick-chat-prompt-modal" style="display: none;">
        <div class="quick-chat-prompt-modal-content">
            <div class="quick-chat-prompt-modal-header">
                <span class="quick-chat-prompt-modal-title">编辑提示词</span>
                <button class="quick-chat-prompt-modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <textarea class="quick-chat-prompt-modal-textarea" placeholder="输入提示词..."></textarea>
            <div class="quick-chat-prompt-modal-actions">
                <button class="quick-chat-prompt-modal-cancel">取消</button>
                <button class="quick-chat-prompt-modal-save">保存</button>
            </div>
        </div>
    </div>

    <!-- Reset Confirmation Modal (shared) -->
    <div id="reset-confirm-modal-1" class="confirm-modal" style="display: none;">
        <div class="confirm-modal-content">
            <p>您确定要重置为默认选项吗？</p>
            <small>此操作将删除所有自定义选项且无法撤销。</small>
            <div class="confirm-modal-actions">
                <button id="cancel-reset-1" class="modal-button cancel">取消</button>
                <button id="confirm-reset-1" class="modal-button confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- History Limit Warning Modal -->
    <div id="history-limit-modal" class="confirm-modal history-limit-modal" style="display: none;">
        <div class="confirm-modal-content history-limit-content">
            <div class="history-limit-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>存储空间提醒</span>
            </div>
            <p class="history-limit-message">您的历史记录已达到 <strong id="history-count">100</strong> 条。</p>
            <small>过多的历史记录可能会影响性能、存储空间和WebDav同步速度。<br>建议清理不需要的对话记录。</small>
            <div class="confirm-modal-actions">
                <button id="history-limit-dismiss" class="modal-button cancel">我知道了</button>
                <button id="history-limit-manage" class="modal-button history-manage">管理历史</button>
            </div>
        </div>
    </div>

    <div class="image-preview-modal">
        <div class="image-preview-content">
            <img src="" alt="预览图片">
            <button class="image-preview-close">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>
    <div id="webpage-content-menu"></div>
    <script src="src/main.js" type="module"></script>
</body>
</html>
