name: Build and Release Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # 當推送新的版本標籤時觸發

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version from manifest
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extension version: $VERSION"

      - name: Validate tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          EXPECTED_TAG="v${{ steps.version.outputs.version }}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest version ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Create Chrome build directory
        run: |
          set -euo pipefail
          mkdir -p build/chrome

          # 複製需要的文件和目錄
          cp -r icons build/chrome/
          cp -r _locales build/chrome/
          cp -r htmd build/chrome/
          cp -r lib build/chrome/
          cp -r src build/chrome/
          cp -r styles build/chrome/
          cp background.js build/chrome/
          cp content.js build/chrome/
          cp index.html build/chrome/
          cp manifest.json build/chrome/

          # 創建 ZIP 文件
          (
            cd build/chrome
            zip -r ../../Cerebr-neo_v${{ steps.version.outputs.version }}.zip . -x "*.DS_Store"
          )

      - name: Generate checksums
        run: |
          set -euo pipefail
          sha256sum Cerebr-neo_v${{ steps.version.outputs.version }}.zip > checksums.txt
          cat checksums.txt

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Cerebr-neo v${{ steps.version.outputs.version }}
          files: |
            Cerebr-neo_v${{ steps.version.outputs.version }}.zip
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Cerebr-neo v${{ steps.version.outputs.version }}

            ### 校驗
            請參考 `checksums.txt` 文件驗證下載的完整性。

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-builds-v${{ steps.version.outputs.version }}
          path: |
            Cerebr-neo_v${{ steps.version.outputs.version }}.zip
            checksums.txt
          if-no-files-found: error
          retention-days: 90
