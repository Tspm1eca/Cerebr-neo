name: Build and Release Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # 當推送新的版本標籤時觸發

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(grep -Po '"version":\s*"\K[^"]+' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $VERSION"

      - name: Create Chrome build directory
        run: |
          mkdir -p build/chrome

          # 複製需要的文件和目錄
          cp -r icons build/chrome/
          cp -r htmd build/chrome/
          cp -r lib build/chrome/
          cp -r src build/chrome/
          cp -r statics build/chrome/
          cp -r styles build/chrome/
          cp background.js build/chrome/
          cp content.js build/chrome/
          cp index.html build/chrome/
          cp manifest.json build/chrome/

          # 創建 ZIP 文件
          cd build/chrome
          zip -r ../../cerebr-chrome-v${{ steps.version.outputs.version }}.zip . -x "*.DS_Store"

      - name: Create Firefox build directory
        run: |
          mkdir -p build/firefox

          # 複製需要的文件和目錄
          cp -r icons build/firefox/
          cp -r htmd build/firefox/
          cp -r lib build/firefox/
          cp -r src build/firefox/
          cp -r statics build/firefox/
          cp -r styles build/firefox/
          cp background.js build/firefox/
          cp content.js build/firefox/
          cp index.html build/firefox/
          cp manifest.firefox.json build/firefox/manifest.json

          # 創建 ZIP 文件
          cd build/firefox
          zip -r ../../cerebr-firefox-v${{ steps.version.outputs.version }}.zip . -x "*.DS_Store"

      - name: Generate checksums
        run: |
          sha256sum cerebr-chrome-v${{ steps.version.outputs.version }}.zip > checksums.txt
          sha256sum cerebr-firefox-v${{ steps.version.outputs.version }}.zip >> checksums.txt
          cat checksums.txt

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cerebr-chrome-v${{ steps.version.outputs.version }}.zip
            cerebr-firefox-v${{ steps.version.outputs.version }}.zip
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Cerebr-neo v${{ steps.version.outputs.version }}

            ### 下載
            - **Chrome/Edge**: `cerebr-chrome-v${{ steps.version.outputs.version }}.zip`
            - **Firefox**: `cerebr-firefox-v${{ steps.version.outputs.version }}.zip`

            ### 校驗和
            請參考 `checksums.txt` 文件驗證下載的完整性。

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-builds-v${{ steps.version.outputs.version }}
          path: |
            cerebr-chrome-v${{ steps.version.outputs.version }}.zip
            cerebr-firefox-v${{ steps.version.outputs.version }}.zip
            checksums.txt
          retention-days: 90